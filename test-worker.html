<!DOCTYPE html>
<html>
<head>
    <title>Test Worker</title>
</head>
<body>
    <h1>Cloudflare Worker Test</h1>
    <button onclick="testWorker()">Test Worker</button>
    <pre id="result"></pre>

    <script>
        async function testWorker() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Testing...';
            
            try {
                const response = await fetch('https://white-flower-3602.jdnicolson.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: 'What is your cancellation policy?' })
                });
                
                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
